<div class="content-area">
  <div class="page-header">
    <h1>Add Journal Entry</h1>
    <p>Record a transaction easily — no accounting knowledge required 😊</p>
  </div>

  <div class="card">
    <form class="fade-in" (ngSubmit)="onSubmit()" #journalForm="ngForm" autocomplete="off">

      <div class="form-grid">
        <!-- DATE -->
        <div class="form-group">
          <label class="form-label">Date *</label>
          <input type="date" class="form-input"
                 [(ngModel)]="journalEntry.date"
                 name="date" required />
        </div>

        <!-- ACCOUNT -->
        <div class="form-group">
          <label class="form-label">Transaction Type *</label>
          <select class="form-input"
                  [(ngModel)]="journalEntry.accountName"
                  name="accountName"
                  required>
            <option value="">Select transaction type</option>
            <option value="cash">Cash</option>
            <option value="bank">Bank Transfer</option>
            <option value="sales">Sales Income</option>
            <option value="salary">Salary Paid</option>
            <option value="rent">Office Rent</option>
            <option value="utilities">Utilities / Bills</option>
            <option value="equipment">Equipment Purchase</option>
          </select>
        </div>

        <!-- DEBIT -->
        <div class="form-group">
          <label class="form-label">
            Debit Amount (Money Received 💰)
          </label>
          <input type="number"
                 class="form-input"
                 placeholder="Example: Customer paid you"
                 step="0.01"
                 [(ngModel)]="journalEntry.debit"
                 (input)="onDebitChange()"
                 name="debit" />
        </div>

        <!-- CREDIT -->
        <div class="form-group">
          <label class="form-label">
            Credit Amount (Money Spent 💸)
          </label>
          <input type="number"
                 class="form-input"
                 placeholder="Example: You paid rent"
                 step="0.01"
                 [(ngModel)]="journalEntry.credit"
                 (input)="onCreditChange()"
                 name="credit" />
        </div>
      </div>

      <!-- NARRATION -->
      <div class="form-group" style="margin-top: 16px;">
        <label class="form-label">Description *</label>
        <textarea class="form-input"
                  rows="3"
                  placeholder="Example: Paid office rent for January"
                  [(ngModel)]="journalEntry.narration"
                  name="narration"
                  required></textarea>
      </div>

      <!-- ERROR -->
      <div *ngIf="errorMessage"
           style="margin-top: 12px; padding: 12px; background: #fee; border-radius: 6px; color: #c00;">
        {{ errorMessage }}
      </div>

      <!-- BUTTONS -->
      <div style="display: flex; gap: 12px; margin-top: 16px;">
        <button type="submit"
                class="btn btn-success"
                [disabled]="isLoading || !journalForm.valid">
          <i class="fas"
             [class.fa-save]="!isLoading"
             [class.fa-spinner]="isLoading"
             [class.fa-spin]="isLoading"></i>
          {{ isLoading ? 'Saving...' : 'Save Entry' }}
        </button>

        <button type="button"
                class="btn btn-secondary"
                (click)="resetForm()"
                [disabled]="isLoading">
          <i class="fas fa-redo"></i> Reset
        </button>
      </div>
    </form>
  </div>
</div>
