<!-- Header -->
<header class="header">
  <div class="header-content">
    <div class="logo">
      <h2><i class="fas fa-calculator"></i> EasyBooks</h2>
    </div>
    <div class="header-actions">
      <div class="user-info">
        <span class="user-name">{{ currentUser.name }}</span>
        <div class="user-avatar">
          <i class="fas fa-user"></i>
        </div>
      </div>
      <button class="btn-logout" (click)="logout()">
        <i class="fas fa-sign-out-alt"></i>
      </button>
    </div>
  </div>
</header>

<!-- Sidebar -->
<div class="dashboard-layout">
  <aside class="sidebar">
    <nav class="sidebar-nav">
      <ul class="nav-menu">
        <li class="nav-item">
          <a routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-link">
            <i class="fas fa-tachometer-alt"></i>
            <span>Dashboard</span>
          </a>
        </li>
        <li class="nav-item">
          <a routerLink="/dashboard/add-journal" routerLinkActive="active" class="nav-link">
            <i class="fas fa-book"></i>
            <span>Add Journal</span>
          </a>
        </li>
        <li class="nav-item">
          <a routerLink="/dashboard/view-journal" routerLinkActive="active" class="nav-link">
            <i class="fas fa-exchange-alt"></i>
            <span>View Journal</span>
          </a>
        </li>
        <li class="nav-item">
          <a routerLink="/dashboard/ledger" routerLinkActive="active" class="nav-link">
            <i class="fas fa-chart-bar"></i>
            <span>Ledger</span>
          </a>
        </li>
        <li class="nav-item">
          <a routerLink="/dashboard/profit-loss" routerLinkActive="active" class="nav-link">
            <i class="fas fa-users"></i>
            <span>Profit & Loss</span>
          </a>
        </li>
        <li class="nav-item">
          <a routerLink="/dashboard/balance-sheet" routerLinkActive="active" class="nav-link">
            <i class="fas fa-cog"></i>
            <span>Balance Sheet</span>
          </a>
        </li>
        <li class="nav-item">
          <a routerLink="/dashboard/profile" routerLinkActive="active" class="nav-link">
            <i class="fas fa-user"></i>
            <span>Profile</span>
          </a>
        </li>
      </ul>
    </nav>
  </aside>
  <main class="content-area">
    <!-- Routed pages load here -->
    <router-outlet></router-outlet>

    
  </main>
</div>
