<div class="auth-wrapper">
  <div class="auth-card fade-in">
    <div class="auth-logo">
      <h1><i class="fas fa-calculator"></i> EasyBooks</h1>
      <p>Accountancy Management System</p>
    </div>
    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input 
          type="email" 
          class="form-input" 
          placeholder="Enter your email" 
          [(ngModel)]="loginData.email"
          name="email"
          required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input 
          type="password" 
          class="form-input" 
          placeholder="Enter your password"
          [(ngModel)]="loginData.password"
          name="password" 
          required>
      </div>
      <button type="submit" class="btn btn-primary" [disabled]="!loginForm.form.valid">
        <i class="fas fa-sign-in-alt"></i> Login
      </button>
    </form>
        <div class="auth-link">
        <p>Don't have an account? <a href="" (click)="navigateToSignup($event)">Sign Up</a></p>
    </div>
  </div>
</div>
